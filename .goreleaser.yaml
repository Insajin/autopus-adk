version: 2
project_name: autopus-adk

builds:
  - id: auto
    binary: auto
    main: ./cmd/auto
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/insajin/autopus-adk/pkg/version.version={{.Version}}
      - -X github.com/insajin/autopus-adk/pkg/version.commit={{.ShortCommit}}
      - -X github.com/insajin/autopus-adk/pkg/version.date={{.Date}}
    hooks:
      post:
        - cmd: scripts/companion-release/produce.sh
          env:
            - COMPANION_ARTIFACT={{ .Path }}
            - COMPANION_TARGET={{ .Target }}
            - COMPANION_PLATFORM={{ .Os }}
            - COMPANION_ARCHITECTURE={{ .Arch }}
            - COMPANION_VERSION={{ .Version }}

archives:
  - id: auto
    ids:
      - auto
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
          - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: LICENSE*
      - src: README*
      - src: CHANGELOG*
      - src: '{{ if eq .Os "darwin" }}dist/auto_{{ .Target }}/adk-companion-manifest.json{{ else }}scripts/companion-release/no-files-*{{ end }}'
        dst: adk-companion-manifest.json
      - src: '{{ if eq .Os "darwin" }}dist/auto_{{ .Target }}/adk-companion-manifest.sig{{ else }}scripts/companion-release/no-files-*{{ end }}'
        dst: adk-companion-manifest.sig
      - src: '{{ if eq .Os "darwin" }}dist/auto_{{ .Target }}/adk-companion-darwin-receipt.json{{ else }}scripts/companion-release/no-files-*{{ end }}'
        dst: adk-companion-darwin-receipt.json
      - src: '{{ if eq .Os "darwin" }}dist/auto_{{ .Target }}/adk-companion-public-key-receipt.bundle/**{{ else }}scripts/companion-release/no-files-*{{ end }}'
        dst: adk-companion-public-key-receipt.bundle
        strip_parent: true

release:
  replace_existing_artifacts: true
  target_commitish: "{{ .Env.COMPANION_SOURCE_COMMIT }}"

checksum:
  name_template: 'checksums.txt'

signs:
  - id: cosign
    cmd: cosign
    artifacts: checksum
    args:
      - "sign-blob"
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
    signature: "${artifact}.bundle"
    output: true
    env:
      - COSIGN_EXPERIMENTAL=1
  # ECDSA P-256 detached signature over checksums.txt (SPEC-ADK-RELEASE-SIGNING-001).
  # Consumers (pkg/selfupdate, install.sh) verify this with a pinned public key
  # set; cosign's keyless bundle above is kept as defense-in-depth transparency
  # logging, not as the consumer-verified trust anchor.
  - id: ecdsa-release
    cmd: sh
    artifacts: checksum
    args:
      - "-c"
      - |-
        umask 077
        kf="$(mktemp)"
        trap 'rm -f "$kf"' EXIT
        printf '%s' "$ADK_RELEASE_ECDSA_PRIVATE_KEY" > "$kf"
        openssl dgst -sha256 -sign "$kf" -out "${signature}" "${artifact}"
    signature: "${artifact}.sig"
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

homebrew_casks:
  - name: auto
    # GoReleaser renders the canonical Cask, but publication is reconciled with
    # the legacy Formula only after the GitHub release is immutable.
    skip_upload: true
    ids:
      - auto
    repository:
      owner: Insajin
      name: homebrew-autopus
      branch: main
    directory: Casks
    homepage: "https://github.com/Insajin/autopus-adk"
    description: "Agentic Development Kit for coding CLIs (the auto CLI)"
    license: "MIT"
    commit_author:
      name: autopus-release-bot
      email: noreply@autopus.co
    binaries:
      - auto
