version: 2
project_name: autopus-adk

before:
  hooks:
    - go mod tidy

builds:
  - id: auto
    binary: auto
    main: ./cmd/auto
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/insajin/autopus-adk/pkg/version.version={{.Version}}
      - -X github.com/insajin/autopus-adk/pkg/version.commit={{.ShortCommit}}
      - -X github.com/insajin/autopus-adk/pkg/version.date={{.Date}}

archives:
  - id: auto
    ids:
      - auto
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
