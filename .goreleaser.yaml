version: 2
project_name: autopus-adk

before:
  hooks:
    - go mod tidy

builds:
  - id: auto
    binary: auto
    main: ./cmd/auto
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/insajin/autopus-adk/pkg/version.version={{.Version}}
      - -X github.com/insajin/autopus-adk/pkg/version.commit={{.ShortCommit}}
      - -X github.com/insajin/autopus-adk/pkg/version.date={{.Date}}

archives:
  - id: auto
    ids:
      - auto
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
          - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  replace_existing_artifacts: true

checksum:
  name_template: 'checksums.txt'

signs:
  - cmd: cosign
    artifacts: checksum
    args:
      - "sign-blob"
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
    signature: "${artifact}.bundle"
    output: true
    env:
      - COSIGN_EXPERIMENTAL=1

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

brews:
  - name: auto
    ids:
      - auto
    repository:
      owner: Insajin
      name: homebrew-autopus
      branch: main
      # Cross-repo push needs a token with write access to the tap repo; the
      # default Actions GITHUB_TOKEN is scoped to autopus-adk only. release.yaml
      # generates this token from the Homebrew release GitHub App installation.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Insajin/autopus-adk"
    description: "Agentic Development Kit for coding CLIs (the auto CLI)"
    license: "MIT"
    commit_author:
      name: autopus-release-bot
      email: noreply@autopus.co
    install: |
      bin.install "auto"
    test: |
      system "#{bin}/auto", "version"
