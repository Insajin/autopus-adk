name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # Release gate: run the full CI suite (build/test/lint/e2e) on the tagged commit.
  # If any CI job fails, the release job below is skipped — a red build cannot ship.
  ci:
    uses: ./.github/workflows/ci.yaml

  release:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Run GoReleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
