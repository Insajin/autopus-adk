name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # Release gate: run the full CI suite (build/test/lint/e2e) on the tagged commit.
  # If any CI job fails, the release job below is skipped — a red build cannot ship.
  ci:
    uses: ./.github/workflows/ci.yaml

  # Security gate: run secret scan and govulncheck on the tagged commit.
  # Blocks release if any vulnerability or secret leak is detected.
  security:
    uses: ./.github/workflows/security.yml

  release:
    needs: [ci, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Create Homebrew tap token
        id: homebrew-app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.HOMEBREW_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          owner: Insajin
          repositories: homebrew-autopus
          permission-contents: write

      - name: Run GoReleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo token for publishing the Homebrew formula to the separate
          # Insajin/homebrew-autopus tap repo. The token is generated from the
          # Homebrew release GitHub App above because the default GITHUB_TOKEN
          # cannot write to another repo.
          HOMEBREW_TAP_TOKEN: ${{ steps.homebrew-app-token.outputs.token }}
