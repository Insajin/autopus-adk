name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      # Compile-check every goreleaser target OS so platform-specific syscall
      # usage is caught here instead of failing the release job at tag time.
      - name: Cross-compile release targets
        run: |
          GOOS=windows GOARCH=amd64 go build ./...
          GOOS=darwin GOARCH=arm64 go build ./...
          GOOS=linux GOARCH=arm64 go build ./...

      - name: Test with Coverage
        run: |
          go test -race -count=1 -timeout=35m -tags integration -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=${COVERAGE_THRESHOLD:-83}
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
        env:
          COVERAGE_THRESHOLD: "83"

      - name: Vet
        run: go vet ./...

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build Binary
        run: make build
      - name: Run E2E Tests
        run: make test-e2e

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          args: --timeout=5m

  static-contracts:
    name: static-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Validate GoReleaser configuration
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "v2.17.0"
          args: check

      - name: Validate shell syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' script; do
            bash -n "$script"
          done < <(git ls-files -z '*.sh')

  macos-runtime:
    name: macos-runtime
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Test macOS companion runtime contracts
        run: >-
          go test -race -count=1 -timeout=8m
          ./internal/companionmanifest/... ./pkg/companionmanifest/... ./pkg/selfupdate

      - name: Test macOS POSIX installer signing
        run: go test -count=1 -timeout=5m . -run '^TestPOSIXInstaller'

  windows-runtime:
    name: windows-runtime
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Test Windows self-update runtime contracts
        run: go test -count=1 -timeout=8m ./pkg/selfupdate

      - name: Test Windows process probe subtree cleanup
        run: go test -count=3 -timeout=2m ./pkg/processprobe -run '^TestOutputWindows'

      - name: Test Windows self-update CLI failure boundaries
        run: >-
          go test -count=1 -timeout=5m ./internal/cli
          -run '^(TestResolveCurrentBinaryPath_FailsClosedWhenSymlinkEvalFails|TestWithSelfUpdateTempDir_DoesNotRunAfterCreateFailure)$'

      - name: Test Windows installer signing on PowerShell 5.1
        run: >-
          powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass
          -File scripts/release-signing/tests/windows-installer-signing-test.ps1

      - name: Test Windows installer signing on PowerShell 7
        run: >-
          pwsh.exe -NoLogo -NoProfile -NonInteractive
          -File scripts/release-signing/tests/windows-installer-signing-test.ps1
