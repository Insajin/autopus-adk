name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      # Compile-check every goreleaser target OS so platform-specific syscall
      # usage is caught here instead of failing the release job at tag time.
      - name: Cross-compile release targets
        run: |
          GOOS=windows GOARCH=amd64 go build ./...
          GOOS=darwin GOARCH=arm64 go build ./...
          GOOS=linux GOARCH=arm64 go build ./...

      # @AX:REASON [AUTO]: Keep the process-heavy Bash release fixture off the shared Go package scheduler while preserving its race gate.
      - name: Test release hardening contract in isolation
        shell: bash
        run: |
          set -euo pipefail
          inventory="$(go test -list '^TestReleaseHardeningBashContract$' ./internal/companionmanifest)"
          count="$(
            printf '%s\n' "$inventory" |
              awk '$0 == "TestReleaseHardeningBashContract" { found++ } END { print found + 0 }'
          )"
          [[ "$count" == 1 ]]
          go test -race -count=1 -timeout=5m \
            -run '^TestReleaseHardeningBashContract$' \
            ./internal/companionmanifest

      - name: Test with Coverage
        run: |
          go test -race -count=1 -timeout=20m \
            -skip '^TestReleaseHardeningBashContract$' \
            -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=${COVERAGE_THRESHOLD:-83}
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
        env:
          COVERAGE_THRESHOLD: "83"

      - name: Vet
        run: go vet ./...

  lineage-integration:
    name: lineage-integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      # @AX:REASON [AUTO]: Keep the bounded GoReleaser warm-up off the shared package scheduler so its 23-minute budget is deterministic.
      - name: Test non-lineage integration packages
        shell: bash
        run: |
          set -euo pipefail
          lineage_package="$(go list -tags integration ./pkg/companionmanifest)"
          all_packages="$(go list -tags integration ./...)"
          packages=()
          lineage_matches=0
          while IFS= read -r package; do
            if [[ "$package" == "$lineage_package" ]]; then
              lineage_matches=$((lineage_matches + 1))
            else
              packages+=("$package")
            fi
          done <<<"$all_packages"
          ((lineage_matches == 1))
          ((${#packages[@]} > 0))
          go test -count=1 -timeout=15m -tags integration "${packages[@]}"

      - name: Test release lineage integration
        run: >-
          go test -count=1 -timeout=23m -tags integration
          ./pkg/companionmanifest

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build Binary
        run: make build
      - name: Run E2E Tests
        run: make test-e2e

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          args: --timeout=5m

  static-contracts:
    name: static-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Validate GoReleaser configuration
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "v2.17.0"
          args: check

      - name: Validate shell syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' script; do
            bash -n "$script"
          done < <(git ls-files -z '*.sh')

  macos-runtime:
    name: macos-runtime
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build host-native unsigned macOS runtime smoke binary
        shell: bash
        run: |
          set -euo pipefail
          host_arch="$(uname -m)"
          go_arch="$(go env GOARCH)"
          case "${host_arch}:${go_arch}" in
            arm64:arm64|x86_64:amd64) ;;
            *)
              echo "::error::Host architecture ${host_arch} does not match Go architecture ${go_arch}"
              exit 1
              ;;
          esac

          runtime_version="ci-${GITHUB_SHA:0:12}"
          runtime_commit="${GITHUB_SHA:0:12}"
          runtime_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          runtime_binary="${RUNNER_TEMP}/auto-runtime-smoke"
          go build -trimpath \
            -ldflags "-s -w -X github.com/insajin/autopus-adk/pkg/version.version=${runtime_version} -X github.com/insajin/autopus-adk/pkg/version.commit=${runtime_commit} -X github.com/insajin/autopus-adk/pkg/version.date=${runtime_date}" \
            -o "$runtime_binary" ./cmd/auto
          {
            echo "AUTOPUS_CI_RUNTIME_BINARY=${runtime_binary}"
            echo "AUTOPUS_CI_RUNTIME_VERSION=${runtime_version}"
          } >> "$GITHUB_ENV"

      - name: Smoke host-native unsigned macOS command admission
        shell: bash
        run: |
          # This source-built smoke does not replace the Developer ID signed and notarized release gate.
          set -euo pipefail
          AUTOPUS_INSTALLER_TEST_SOURCE=1
          export AUTOPUS_INSTALLER_TEST_SOURCE
          . ./install.sh
          . ./scripts/install-runtime-v1.sh

          runtime_output_file="${RUNNER_TEMP}/auto-runtime-smoke.version.out"
          set +e
          run_version_smoke "$AUTOPUS_CI_RUNTIME_BINARY" "$runtime_output_file"
          runtime_status=$?
          set -e
          if [[ "$runtime_status" -ne 0 ]]; then
            runtime_output="$(cat "$runtime_output_file")"
            rm -f "$runtime_output_file"
            if [[ "$runtime_status" -eq 124 ]]; then
              echo "::error::Unsigned macOS runtime smoke timed out; the command and observed attached descendants were terminated"
            else
              echo "::error::Unsigned macOS runtime smoke failed with status ${runtime_status}: ${runtime_output}"
            fi
            exit 1
          fi
          if ! version_smoke_output_matches "$AUTOPUS_CI_RUNTIME_VERSION" "$runtime_output_file"; then
            runtime_output="$(cat "$runtime_output_file")"
            rm -f "$runtime_output_file"
            echo "::error::Runtime version output ${runtime_output} does not exactly match ${AUTOPUS_CI_RUNTIME_VERSION}"
            exit 1
          fi
          rm -f "$runtime_output_file"

      - name: Test macOS companion runtime contracts
        run: >-
          go test -race -count=1 -timeout=8m
          ./internal/companionmanifest/... ./pkg/companionmanifest/... ./pkg/selfupdate
          ./scripts/companion-release/execsmoke

      - name: Test macOS POSIX installer signing
        run: go test -count=1 -timeout=5m . -run '^TestPOSIXInstaller'

  windows-runtime:
    name: windows-runtime
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Test Windows self-update runtime contracts
        run: go test -count=1 -timeout=8m ./pkg/selfupdate

      - name: Test Windows process probe subtree cleanup
        run: go test -count=3 -timeout=2m ./pkg/processprobe -run '^TestOutputWindows'

      - name: Test Windows self-update CLI failure boundaries
        run: >-
          go test -count=1 -timeout=5m ./internal/cli
          -run '^(TestResolveCurrentBinaryPath_FailsClosedWhenSymlinkEvalFails|TestWithSelfUpdateTempDir_DoesNotRunAfterCreateFailure|TestVerifyAndReplaceSelfUpdate_.*|TestProbeStagedSelfUpdateVersion_.*|TestNormalizeSelfUpdateVersionOutput_.*)$'

      - name: Test Windows installer signing on PowerShell 5.1
        run: >-
          powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass
          -File scripts/release-signing/tests/windows-installer-signing-test.ps1

      - name: Test Windows installer signing on PowerShell 7
        run: >-
          pwsh.exe -NoLogo -NoProfile -NonInteractive
          -File scripts/release-signing/tests/windows-installer-signing-test.ps1
