# Eval-regression PR gate (SPEC-EVAL-REGRESSION-CI-001, hardened by
# SPEC-EVAL-REGRESSION-PROV-001).
#
# This gate consumes the eval_regression_report.v1 artifact produced upstream by
# the Primary SPEC (SPEC-COMPANY-OPS-EVAL-001, REQ-COE-EXPORT-001) and fails the
# PR check when verdict.Blocked is true, or when the artifact is missing,
# malformed, stale, unsafe, unsigned, or signed by an untrusted key. The gate
# recomputes nothing (REQ-ECI-SEAM-001); it verifies-before-trust then enforces.
#
# SECURITY (provenance / trust boundary — three layers):
#   L1 — artifact trust: CLOSED. The gate no longer treats a PR-writable file as
#        authoritative. The consumer CLI verifies the ed25519 signature in the
#        eval_regression_attestation.v1 sidecar against a committed pubkey
#        allowlist BEFORE strict-decode (SPEC-EVAL-REGRESSION-PROV-001,
#        REQ-EVP-VERIFY-001/REQ-EVP-UNSIGNED-001). A PR that commits a forged
#        `blocked:false` report cannot satisfy verify: it fails closed with
#        reason artifact_unsigned / signature_invalid / untrusted_key.
#   L2 — verifier trust: CLOSED. The verifier is a PINNED released `auto` binary
#        obtained via `go install ...@<pinned-tag>` (see EVAL_REGRESSION_VERIFIER_VERSION).
#        It is NOT built from the PR head, so PR-head edits to cmd/auto,
#        internal/cli, or pkg/evalregression do NOT run in this gate.
#   L3 — workflow trust: RESIDUAL / MITIGATED. The workflow definition itself is
#        PR-editable on feature branches, but the gate only becomes authoritative
#        once ops registers the `eval-regression` check as a required status check
#        on branch main (see .github/EVAL_REGRESSION_REQUIRED_CHECK.md) and pins
#        the actions used below. Branch-protection settings are server-side and
#        not PR-editable; the required-check name is the trust anchor.
#
# FAIL-CLOSED POSTURE:
#   The gate step runs UNCONDITIONALLY (no hashFiles() skip, no advisory/warn
#   mode). A missing, unsigned, or untrusted artifact fails the check rather than being
#   silently skipped. Until LIVE-A (real signed emission) publishes the artifact
#   from a trusted producer, this check is EXPECTED to fail; it is therefore NOT
#   yet a required status check (promotion is an ops-only action gated on LIVE-A,
#   documented in the readiness runbook). This is the deliberate structural
#   fail-closed posture, not a live-blocking regression.

name: Eval Regression Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  # actions:read lets the trusted-source fetch below download the report +
  # attestation produced by the trusted producer workflow run (LIVE-A). It grants
  # no write scope.
  actions: read

env:
  # SINGLE SOURCE OF TRUTH for the artifact path. The trusted-fetch step and the
  # gate `run:` command below both reference this exact path.
  EVAL_REGRESSION_ARTIFACT: .autopus/artifacts/eval_regression_report.json
  # PINNED verifier release ref (L2). Ops bumps this concrete tag at promotion
  # time so the gate always runs a fixed, released verifier — never PR-head code.
  EVAL_REGRESSION_VERIFIER_VERSION: v0.4.0

jobs:
  eval-regression:
    runs-on: ubuntu-latest
    steps:
      # Pinned to conservative, widely-available stable majors (REQ-EVP-PINACT-001).
      # These majors are fixed references; a SHA pin is an Evolution, not required.
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # L2: install the PINNED released verifier. `go install ...@<tag>` places the
      # `auto` binary on PATH (setup-go adds GOPATH/bin). This is deterministic and
      # independent of the PR-head working tree, so edits to cmd/auto,
      # internal/cli, or pkg/evalregression in the PR do NOT run in this gate.
      - name: Install pinned verifier
        run: go install github.com/insajin/autopus-adk/cmd/auto@${EVAL_REGRESSION_VERIFIER_VERSION}

      # Fetch the report + attestation from the TRUSTED PRODUCER (LIVE-A), not the
      # PR-head tree. This step activates once LIVE-A (SPEC-COE-RUNTIME-LIVE-001)
      # publishes eval_regression_report.v1 + eval_regression_attestation.v1 from a
      # trusted producer workflow run. It is best-effort here: if the trusted
      # source has not published yet, the file stays absent and the gate step
      # below fails closed on artifact_missing (never silently skipped).
      - name: Fetch trusted verdict artifact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$(dirname "$EVAL_REGRESSION_ARTIFACT")"
          # LIVE-A activation point: download the report + attestation sidecar
          # produced by the trusted producer run. Kept guarded until LIVE-A emits.
          gh run download --name eval-regression-report \
            --dir "$(dirname "$EVAL_REGRESSION_ARTIFACT")" || true

      # Enforce the gate with the pinned verifier. Runs UNCONDITIONALLY (no
      # hashFiles skip, no advisory/warn mode): a missing/unsigned/untrusted/blocked
      # artifact fails the check. The CLI derives the attestation sidecar path
      # (eval_regression_attestation.json) next to the report when
      # --eval-regression-attestation is omitted (REQ-EVP-VERIFY-001).
      - name: Eval regression gate
        run: auto check --eval-regression --eval-regression-artifact "$EVAL_REGRESSION_ARTIFACT"
